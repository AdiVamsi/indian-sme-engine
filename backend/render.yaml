services:
  - type: web
    name: sme-engine-api
    runtime: node
    plan: starter
    healthCheckPath: /health
    buildCommand: npm install && npm run build && npm run migrate:deploy
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sme-engine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: sme-engine-db
    plan: starter
