<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SME Engine — AI Lead Priority</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/dashboard/style.css" />
  <style>
    /* ── Page shell (mirrors agent.html) ── */
    .agent-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .agent-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 56px;
      background: rgba(15, 15, 32, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.07));
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .agent-topbar__title {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text, #e2e8f0);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .agent-topbar__badge {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(129, 140, 248, 0.15);
      color: #818cf8;
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
    }

    .agent-topbar__back {
      font-size: 0.8125rem;
      color: var(--muted, #64748b);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.15s;
    }

    .agent-topbar__back:hover { color: var(--text, #e2e8f0); }

    .agent-main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Page heading ── */
    .priority-page__heading {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text, #f1f5f9);
      letter-spacing: -0.03em;
      margin-bottom: 0.375rem;
    }

    .priority-page__sub {
      font-size: 0.8125rem;
      color: var(--muted, #64748b);
      margin-bottom: 1.75rem;
    }

    /* ── Priority card list ── */
    .priority-list {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    /* ── Priority card ── */
    .priority-card {
      background: var(--card, #0f0f20);
      border: 1px solid var(--border, rgba(255, 255, 255, 0.07));
      border-radius: 0.875rem;
      padding: 1.25rem 1.5rem;
      border-left-width: 3px;
      animation: priorityCardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes priorityCardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .priority-card--hot  { border-left-color: #f87171; }
    .priority-card--warm { border-left-color: #fbbf24; }
    .priority-card--normal { border-left-color: rgba(148, 163, 184, 0.3); }

    .priority-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .priority-card__name {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text, #f1f5f9);
    }

    /* ── Priority badges ── */
    .priority-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-radius: 999px;
      padding: 0.22rem 0.65rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge--hot    { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
    .badge--warm   { background: rgba(251, 191, 36,  0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36,  0.3); }
    .badge--normal { background: rgba(148, 163, 184, 0.1);  color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.2); }

    .priority-card__phone {
      font-size: 0.8125rem;
      color: var(--text-2, #94a3b8);
      margin-bottom: 0.875rem;
    }

    /* ── Score bar row ── */
    .priority-card__score-row {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-bottom: 0.875rem;
    }

    .priority-card__score-label {
      font-size: 0.78rem;
      color: var(--muted, #64748b);
      white-space: nowrap;
      min-width: 148px;
    }

    .priority-card__score-label strong {
      color: var(--primary, #818cf8);
      font-weight: 700;
    }

    .score-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .score-bar__fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary, #818cf8), var(--accent, #34d399));
      transition: width 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Tag chips ── */
    .priority-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag-chip {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(129, 140, 248, 0.12);
      color: var(--primary, #818cf8);
      border: 1px solid rgba(129, 140, 248, 0.22);
      border-radius: 0.35rem;
      padding: 0.18rem 0.55rem;
    }

    .tag-chip--none {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted, #64748b);
      border-color: rgba(255, 255, 255, 0.08);
    }

    /* ── Loading skeleton wrapper ── */
    .priority-loading {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .priority-skeleton {
      background: var(--card, #0f0f20);
      border: 1px solid var(--border, rgba(255, 255, 255, 0.07));
      border-radius: 0.875rem;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── Empty / error states ── */
    .empty-priority {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted, #64748b);
      font-size: 0.875rem;
    }

    .empty-priority__icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .error-state {
      background: rgba(248, 113, 113, 0.06);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 0.875rem;
      padding: 1.25rem 1.5rem;
      color: #f87171;
      font-size: 0.875rem;
    }

    .error-state a { color: var(--primary, #818cf8); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .priority-card__score-row { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
      .score-bar { width: 100%; }
    }
  </style>
</head>
<body>
<div class="agent-wrap">

  <header class="agent-topbar">
    <div class="agent-topbar__title">
      🧠 AI Lead Priority
      <span class="agent-topbar__badge">Live</span>
    </div>
    <a class="agent-topbar__back" href="/dashboard/">← Dashboard</a>
  </header>

  <main class="agent-main">
    <h1 class="priority-page__heading">AI Lead Priority</h1>
    <p class="priority-page__sub" id="subtitle">Scoring leads using your agent configuration…</p>

    <div id="priority-list">
      <!-- Skeleton while JS loads -->
      <div class="priority-loading">
        <div class="priority-skeleton">
          <div class="skeleton" style="width: 45%; height: 14px;"></div>
          <div class="skeleton skeleton--sm"></div>
          <div class="skeleton" style="width: 70%;"></div>
        </div>
        <div class="priority-skeleton">
          <div class="skeleton" style="width: 55%; height: 14px;"></div>
          <div class="skeleton skeleton--sm"></div>
          <div class="skeleton" style="width: 60%;"></div>
        </div>
        <div class="priority-skeleton">
          <div class="skeleton" style="width: 40%; height: 14px;"></div>
          <div class="skeleton skeleton--sm"></div>
          <div class="skeleton" style="width: 75%;"></div>
        </div>
      </div>
    </div>
  </main>

</div>
<script type="module" src="/dashboard/js/lead-priority.js"></script>
</body>
</html>
